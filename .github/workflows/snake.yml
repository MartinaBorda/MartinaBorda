name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: MartinaBorda
          outputs: dist/github-contribution-grid-snake.svg
          color_snake: "#F78DA7"
          color_dots: "#ffe4ec,#ffd1dc,#ffb6c1,#ff9fb0,#f78da7"
