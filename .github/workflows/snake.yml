name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: MartinaBorda
          outputs: dist/snake.svg

          color_snake: "#F78DA7"
          color_dots: "#ffe4ec,#ffd1dc,#ffb6c1,#ff9fb0,#f78da7"
<img src="https://raw.githubusercontent.com/MartinaBorda/MartinaBorda/output/github-contribution-grid-snake.svg?v=2" />
